# ══════════════════════════════════════════════════════════════════════════════
# 🟡 NIVEL 2: Blindando la Entrega (Intermedio / DevSecOps)
# Laboratorio Clase 2 — CoinDash
#
# Objetivo: Implementar "Shift-Left Security" — seguridad desde el inicio
# Incluye: SCA (Dependabot), SAST (CodeQL), Secretos (GitHub Secrets),
#          Escaneo de Contenedores (Trivy)
# ══════════════════════════════════════════════════════════════════════════════

name: 'Nivel 2 — Pipeline DevSecOps'

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'coindash-api/**'
      - '.github/workflows/nivel-2.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'coindash-api/**'
  schedule:
    # Escaneo de seguridad diario a las 6 AM UTC
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  # ── Build + Test (reutilizado del Nivel 1) ───────────────────────────────────
  build-and-test:
    name: '🔨 Build & 🧪 Test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coindash-api

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coindash-api/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

  # ── SCA: Escaneo de Dependencias ─────────────────────────────────────────────
  dependency-scan:
    name: '🔍 SCA — Escaneo de dependencias (npm audit)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coindash-api

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Auditar vulnerabilidades (falla si hay nivel crítico)
        run: npm audit --audit-level=critical

      - name: Generar reporte de auditoría completo
        run: npm audit --json > npm-audit.json || true

      - name: Subir reporte de auditoría
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-audit-report
          path: coindash-api/npm-audit.json

  # ── SAST: Análisis Estático con CodeQL ──────────────────────────────────────
  codeql-analysis:
    name: '🛡️ SAST — Análisis estático con CodeQL'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Realizar análisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript'

  # ── Escaneo de Contenedores con Trivy ──────────────────────────────────────
  container-scan:
    name: '🐳 Escaneo de imagen Docker con Trivy'
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t coindash-api:${{ github.sha }} ./coindash-api

      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: 'coindash-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          # ⭐ BONUS: Falla si se encuentran vulnerabilidades críticas
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Subir resultados Trivy a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── Verificación de Secretos ────────────────────────────────────────────────
  secrets-check:
    name: '🔑 Verificar que no haya secretos expuestos'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Buscar secretos con TruffleHog
        uses: trufflesecurity/trufflehog@v3.93.6
        with:
          path: ./
          extra_args: --debug --only-verified

  # ── Deploy con Secretos de GitHub ───────────────────────────────────────────
  secure-deploy:
    name: '🚀 Deploy Seguro (usa GitHub Secrets)'
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - dependency-scan
      - codeql-analysis
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Desplegar con variables de entorno seguras
        env:
          # Estos valores vienen de GitHub Secrets — nunca van en el código
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  🛡️  CoinDash API — Despliegue Seguro (Nivel 2)  ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "✅ SCA: Sin vulnerabilidades críticas"
          echo "✅ SAST: Análisis CodeQL completado"
          echo "✅ Secretos: Gestionados con GitHub Secrets"
          echo "✅ Contenedor: Imagen escaneada con Trivy"
          echo ""
          echo "🚀 Desplegando versión: ${{ github.sha }}"
          echo "🌐 URL: https://api.coindash.io (simulado)"
          # Verificar que el secreto está disponible sin imprimirlo
          if [ -n "$API_SECRET_KEY" ]; then
            echo "🔑 API_SECRET_KEY: ✅ configurada"
          else
            echo "⚠️  API_SECRET_KEY: No configurada (agrega el secreto en Settings > Secrets)"
          fi
