# ══════════════════════════════════════════════════════════════════════════════
# 🟢 NIVEL 1: El Despertar del Pipeline (Básico)
# Laboratorio Clase 2 — CoinDash
#
# Objetivo: Automatizar el flujo Build → Test → Deploy de la API de Node.js
# Documentación: https://docs.github.com/es/actions
# ══════════════════════════════════════════════════════════════════════════════

name: 'Nivel 1 — Pipeline CI/CD Básico'

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'coindash-api/**'
      - '.github/workflows/nivel-1.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'coindash-api/**'

permissions:
  contents: read

jobs:
  # ── Etapa 1: Build ──────────────────────────────────────────────────────────
  build:
    name: '🔨 Build — Instalación de dependencias'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coindash-api

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coindash-api/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Guardar node_modules en caché para etapas siguientes
        uses: actions/cache@v4
        with:
          path: coindash-api/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('coindash-api/package-lock.json') }}

  # ── Etapa 2: Test ───────────────────────────────────────────────────────────
  test:
    name: '🧪 Test — Pruebas unitarias'
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: coindash-api

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coindash-api/package-lock.json

      - name: Restaurar node_modules desde caché
        uses: actions/cache@v4
        with:
          path: coindash-api/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('coindash-api/package-lock.json') }}

      - name: Ejecutar pruebas unitarias con cobertura
        run: npm test

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coindash-api/coverage/

  # ── Etapa 3: Containerize ───────────────────────────────────────────────────
  containerize:
    name: '🐳 Containerize — Construir imagen Docker'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar caché de capas Docker
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('coindash-api/Dockerfile', 'coindash-api/package-lock.json') }}
          restore-keys: buildx-${{ runner.os }}-

      - name: Construir imagen Docker
        run: |
          docker build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t coindash-api:${{ github.sha }} \
            ./coindash-api

      - name: Mover caché (evita crecimiento indefinido)
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Exportar imagen como artefacto
        run: docker save coindash-api:${{ github.sha }} | gzip > /tmp/coindash-api.tar.gz

      - name: Subir imagen Docker como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/coindash-api.tar.gz

  # ── Etapa 4: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: '🚀 Deploy — Simulación de despliegue'
    runs-on: ubuntu-latest
    needs: containerize
    # Solo hacer deploy desde la rama main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Descargar imagen Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Cargar imagen Docker
        run: docker load < /tmp/coindash-api.tar.gz

      - name: Simular despliegue a producción
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  🚀 CoinDash API — Desplegando a producción  ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "📦 Versión: $(node -p "require('./coindash-api/package.json').version")"
          echo "🐳 Imagen: coindash-api:${{ github.sha }}"
          echo "🌿 Rama: ${{ github.ref_name }}"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Autor: ${{ github.actor }}"
          echo ""
          echo "✅ Despliegue completado exitosamente"
          echo "🌐 URL: https://api.coindash.io (simulado)"
